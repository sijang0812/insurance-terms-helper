# document-service 설정
server:
  port: 8081

spring:
  application:
    name: document-service
  servlet:
    multipart:
      # PDF 업로드 용량 제한. DocumentServiceImpl의 MAX_FILE_SIZE와 같은 값으로 맞춰둔다.
      max-file-size: 20MB
      max-request-size: 20MB

  # Neon(PostgreSQL + pgvector) 연결 정보.
  # 절대 여기에 실제 값을 직접 적지 않는다 - 환경변수로 주입받는다.
  # Neon 콘솔에서 "Connection string" 중 Java/JDBC 형식을 그대로 DB_URL에 사용하면 된다.
  # 예) DB_URL=jdbc:postgresql://ep-xxxx.neon.tech/neondb?sslmode=require
  datasource:
    url: ${DB_URL:}
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
  sql:
    init:
      # 외부 DB(Neon)는 기본적으로 schema.sql을 자동 실행하지 않으므로 always로 켜준다.
      mode: always

# llm-gateway-service 호출용 (임베딩 API)
services:
  llm-gateway-service:
    url: http://localhost:8083

# 약관 PDF는 텍스트가 많아 로그가 길어질 수 있어 기본은 INFO로 둔다.
logging:
  level:
    com.iht.document: INFO
